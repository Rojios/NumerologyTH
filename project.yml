name: NumerologyTH
options:
  bundleIdPrefix: com.rojios
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    INFOPLIST_FILE: NumerologyTH/Info.plist

targets:
  NumerologyTH:
    type: application
    platform: iOS
    sources:
      - path: NumerologyTH
        excludes:
          - "**/*.json"
          - "Resources/KnowledgeBase/**"
          - "Resources/Assets.xcassets/**"
    resources:
      - path: NumerologyTH/Resources/Assets.xcassets
      - path: NumerologyTH/Resources/KnowledgeBase
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rojios.numerologyth
        INFOPLIST_FILE: NumerologyTH/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    entitlements:
      path: NumerologyTH/NumerologyTH.entitlements
      properties:
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.rojios.numerologyth
        com.apple.developer.icloud-services:
          - CloudKit
        com.apple.developer.in-app-payments:
          - merchant.com.rojios.numerologyth

  NumerologyTHTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: NumerologyTHTests
    dependencies:
      - target: NumerologyTH
